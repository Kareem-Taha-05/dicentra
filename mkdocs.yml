site_name: Dicentra
site_description: Clinical DICOM viewer — window/level, series browser, metadata, colormaps
site_url: https://Kareem-Taha-05.github.io/dicentra
repo_url: https://github.com/Kareem-Taha-05/dicentra
repo_name: Kareem-Taha-05/dicentra
copyright: Copyright &copy; 2025 Kareem

theme:
  name: material
  favicon: assets/branding/logo.svg
  logo: assets/branding/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Usage Guide: usage.md
  - Architecture: architecture.md
  - API Reference:
      - Image Processing: api/image_processing.md
      - Data Loaders: api/loaders.md

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Kareem-Taha-05/dicentra

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
