<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1C1830"/>
      <stop offset="100%" stop-color="#0E0B1A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#7C3AED" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Glow -->
  <circle cx="100" cy="100" r="70" fill="url(#glow)"/>

  <!-- Crosshair — horizontal line -->
  <line x1="34" y1="100" x2="166" y2="100" stroke="#7C3AED" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Crosshair — vertical line -->
  <line x1="100" y1="34" x2="100" y2="166" stroke="#7C3AED" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Cross gaps (centre cutout effect) -->
  <rect x="86" y="86" width="28" height="28" fill="#0E0B1A" fill-opacity="0.9"/>

  <!-- Central scan ring -->
  <circle cx="100" cy="100" r="36" fill="none" stroke="#A78BFA" stroke-width="2" stroke-opacity="0.9"/>
  <circle cx="100" cy="100" r="26" fill="none" stroke="#7C3AED" stroke-width="1"  stroke-opacity="0.5"/>

  <!-- Tick marks on ring -->
  <line x1="100" y1="60" x2="100" y2="66" stroke="#A78BFA" stroke-width="2"/>
  <line x1="100" y1="134" x2="100" y2="140" stroke="#A78BFA" stroke-width="2"/>
  <line x1="60" y1="100" x2="66" y2="100" stroke="#A78BFA" stroke-width="2"/>
  <line x1="134" y1="100" x2="140" y2="100" stroke="#A78BFA" stroke-width="2"/>

  <!-- Central dot -->
  <circle cx="100" cy="100" r="5" fill="#F59E0B"/>
  <circle cx="100" cy="100" r="3" fill="#FCD34D"/>

  <!-- Corner brackets -->
  <path d="M 38 54 L 38 42 L 50 42"  fill="none" stroke="#6B6890" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 162 54 L 162 42 L 150 42" fill="none" stroke="#6B6890" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 38 146 L 38 158 L 50 158" fill="none" stroke="#6B6890" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 162 146 L 162 158 L 150 158" fill="none" stroke="#6B6890" stroke-width="1.5" stroke-linecap="round"/>
</svg>
